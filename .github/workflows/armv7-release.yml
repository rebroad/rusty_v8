name: armv7-release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload assets to (for example v146.4.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-armv7:
    name: Build armv7 prebuilt artifacts
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    env:
      V8_FROM_SOURCE: true
      TARGET: armv7-unknown-linux-gnueabihf
      LIB_NAME: librusty_v8_release_armv7-unknown-linux-gnueabihf.a.gz
      BINDING_NAME: src_binding_release_armv7-unknown-linux-gnueabihf.rs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install armv7 cross toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup target add "${TARGET}"
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf pkg-config
          echo "CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc" >> "$GITHUB_ENV"

      - name: Build release armv7 artifacts
        shell: bash
        run: |
          set -euo pipefail
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=amd64
          cargo build --release --target "${TARGET}"
          gzip -9c "target/${TARGET}/release/gn_out/obj/librusty_v8.a" > "${LIB_NAME}"
          cp "target/${TARGET}/release/gn_out/src_binding.rs" "${BINDING_NAME}"
          ls -lh "${LIB_NAME}" "${BINDING_NAME}"

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes "armv7 prebuilt artifacts"
          fi

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            librusty_v8_release_armv7-unknown-linux-gnueabihf.a.gz
            src_binding_release_armv7-unknown-linux-gnueabihf.rs
